# Implementation plan, todos, validations, and tests for the task-board project.

plan: "Phase 1: Core board CRUD with columns and tasks. Phase 2: Assignments and personal view. Phase 3: Real-time sync."

todos:
  - id: TODO-001
    description: "Set up database schema for tasks, columns, and users"
    status: done
    requirementRefs:
      - REQ-001
      - REQ-002
  - id: TODO-002
    description: "Implement board UI with drag-and-drop task movement"
    status: in-progress
    requirementRefs:
      - REQ-001
      - REQ-002
  - id: TODO-003
    description: "Add user assignment to tasks and personal task view"
    status: pending
    requirementRefs:
      - REQ-003
  - id: TODO-004
    description: "Integrate real-time subscriptions for live board updates"
    status: pending
    requirementRefs:
      - REQ-004

validations:
  - id: VAL-001
    description: "Board loads within 500ms with up to 200 tasks"
    requirementRefs:
      - REQ-001
  - id: VAL-002
    description: "Real-time updates propagate to all connected clients within 1 second"
    requirementRefs:
      - REQ-004

tests:
  - id: TEST-001
    description: "User can create a task and see it appear in the correct column"
    type: integration
    requirementRefs:
      - REQ-001
      - REQ-002
  - id: TEST-002
    description: "Dragging a task between columns updates the database and persists on reload"
    type: e2e
    requirementRefs:
      - REQ-001
      - REQ-002
  - id: TEST-003
    description: "Assigning a user to a task shows it in their personal view"
    type: integration
    requirementRefs:
      - REQ-003
