# Design decisions for the task-board project.

notes: "Key architectural decisions for the task board MVP. Focus on simplicity and speed."

decisions:
  - id: DEC-001
    topic: "Database choice"
    context: "We need a database that supports real-time subscriptions and handles the relational nature of tasks, columns, and users."
    requirementRefs:
      - REQ-001
      - REQ-004
    options:
      - id: postgres
        title: "PostgreSQL with Supabase"
        description: "Managed Postgres with built-in real-time subscriptions via Supabase"
        pros:
          - "Strong relational model for tasks/columns/users"
          - "Built-in real-time via Supabase Realtime"
          - "Free tier sufficient for MVP"
        cons:
          - "Requires schema migrations"
          - "Supabase adds vendor dependency"
      - id: mongodb
        title: "MongoDB Atlas"
        description: "Document database with change streams for real-time"
        pros:
          - "Flexible schema for rapid iteration"
          - "Change streams for real-time updates"
        cons:
          - "Less natural for relational task data"
          - "Change streams add complexity"
    chosen: postgres
    chosenReason: "Tasks, columns, and assignments are inherently relational. Supabase gives us real-time out of the box with minimal setup."

  - id: DEC-002
    topic: "Drag-and-drop library"
    context: "The board needs smooth, accessible drag-and-drop for reordering tasks and moving them between columns."
    requirementRefs:
      - REQ-001
      - REQ-002
    options:
      - id: dnd-kit
        title: "@dnd-kit/core"
        description: "Modern, lightweight drag-and-drop toolkit for React"
        pros:
          - "Built for React with hooks API"
          - "Excellent accessibility support"
          - "Small bundle size (~10KB)"
        cons:
          - "Newer library with smaller community"
      - id: react-beautiful-dnd
        title: "react-beautiful-dnd"
        description: "Mature drag-and-drop library from Atlassian"
        pros:
          - "Battle-tested in production (Trello)"
          - "Great documentation"
        cons:
          - "Officially deprecated / maintenance mode"
          - "Larger bundle size"
    chosen: null
    chosenReason: null
