notes: "Design decisions for the TaskFlow notifications system — real-time updates, email delivery, and preference management."
decisions:
  - id: NOTIF-DES-001
    topic: "Real-time Notification Delivery"
    context: "We need a mechanism to push notifications to the browser in real time when task events occur (assignment, mention, status change)."
    category: technology
    requirementRefs:
      - NOTIF-001
      - NOTIF-003
    contextRefs:
      - N-CTX-002
    globalDecisionRefs:
      - GLOBAL-001
    options:
      - id: OPT-SSE
        title: "Server-Sent Events (SSE)"
        description: "Use SSE for server-to-client push. Simple, HTTP-based, works through proxies and load balancers."
        pros:
          - "Simple to implement — just an HTTP endpoint"
          - "Built-in browser support, no library needed"
          - "Works through most proxies and CDNs"
          - "Auto-reconnect built into the spec"
        cons:
          - "Unidirectional — client can't send messages back"
          - "Limited to ~6 connections per domain in some browsers"
      - id: OPT-WS
        title: "WebSockets"
        description: "Full-duplex WebSocket connection for bidirectional real-time communication."
        pros:
          - "Bidirectional — client and server can both send messages"
          - "Lower latency for high-frequency updates"
          - "Single connection handles all real-time needs"
        cons:
          - "More complex to implement and debug"
          - "Requires WebSocket-aware load balancer"
          - "Need to handle reconnection logic manually"
    chosen: OPT-SSE
    chosenReason: "Notifications are inherently server-to-client. SSE's simplicity, built-in reconnection, and proxy compatibility make it the right fit for our small team and timeline."

  - id: NOTIF-DES-002
    topic: "Email Delivery Service"
    context: "We need to send transactional emails for notification preferences and daily digests. We need a reliable, affordable email service."
    category: infrastructure
    requirementRefs:
      - NOTIF-002
      - NOTIF-004
    contextRefs:
      - CTX-001
      - N-CTX-001
    options:
      - id: OPT-RESEND
        title: "Resend"
        description: "Modern email API with React email templates, great DX, and generous free tier (3,000 emails/month)."
        pros:
          - "React Email for templating — fits our stack"
          - "Excellent developer experience"
          - "Generous free tier for MVP"
          - "Simple API, good TypeScript SDK"
        cons:
          - "Newer service, less proven at scale"
          - "Fewer advanced features than SendGrid"
      - id: OPT-SENDGRID
        title: "SendGrid"
        description: "Established email platform with extensive features, analytics, and a free tier (100 emails/day)."
        pros:
          - "Battle-tested, handles billions of emails"
          - "Rich analytics and deliverability tools"
          - "Extensive documentation"
        cons:
          - "More complex API"
          - "Free tier is very limited (100/day)"
          - "Template system is less developer-friendly"
    chosen: null
    chosenReason: null

  - id: NOTIF-DES-003
    topic: "Notification Storage"
    context: "We need to store notifications so users can see their history, mark as read, and we can track delivery status."
    category: data
    requirementRefs:
      - NOTIF-001
      - NOTIF-003
    globalDecisionRefs:
      - GLOBAL-002
    notes: "Consider whether notifications should live in the main PostgreSQL database or a separate store optimized for time-series/append-only data."
    options:
      - id: OPT-SAME-DB
        title: "PostgreSQL (same database)"
        description: "Store notifications in the same PostgreSQL database as the rest of the app, with a notifications table."
        pros:
          - "No additional infrastructure"
          - "Can join with users/tasks for rich queries"
          - "Transactional consistency with task mutations"
        cons:
          - "Notification volume could strain the main DB"
          - "Read/write patterns differ from task data"
      - id: OPT-SEPARATE-REDIS
        title: "Redis for recent + PostgreSQL for archive"
        description: "Keep recent notifications in Redis sorted sets for fast retrieval, archive older ones to PostgreSQL."
        pros:
          - "Very fast reads for the notification bell"
          - "Sorted sets are perfect for unread counts"
          - "Isolates notification load from main DB"
        cons:
          - "Adds Redis as infrastructure dependency"
          - "Two-system complexity for a small team"
          - "Data sync between Redis and PostgreSQL"
    chosen: null
    chosenReason: null
