visionAlignment: "The core app delivers the main task management experience — creating, organizing, and tracking work items"
requirements:
  - id: REQ-001
    description: "Users can create, edit, and delete tasks with a title, description, and status"
    userValue: "Teams can track their work items in one place"
  - id: REQ-002
    description: "Users can organize tasks into boards with customizable columns"
    userValue: "Teams can visualize their workflow and see bottlenecks"
  - id: REQ-003
    description: "Users can assign tasks to team members"
    userValue: "Everyone knows who is responsible for what"
  - id: REQ-004
    description: "Users can search and filter tasks by status, assignee, or keyword"
    userValue: "Teams can quickly find the task they need without scrolling"
  - id: REQ-005
    description: "The app loads and responds in under 200ms for all common actions"
    userValue: "The tool feels instant and never slows the team down"
