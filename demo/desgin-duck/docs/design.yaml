# High-level design decisions that all projects must follow
notes: "Global architectural decisions for TaskFlow — these apply to all projects."
decisions:
  - id: GLOBAL-001
    topic: "Primary Programming Language"
    context: "We need to choose a consistent language for the entire codebase to minimize context switching and maximize code sharing."
    category: technology
    requirementRefs: []
    contextRefs:
      - CTX-004
    options:
      - id: OPT-TS
        title: "TypeScript (full-stack)"
        description: "Use TypeScript for both frontend and backend, enabling code sharing and consistent tooling."
        pros:
          - "Both founders are experienced TypeScript developers"
          - "Code sharing between frontend and backend (types, validation)"
          - "Rich ecosystem for web development"
        cons:
          - "Runtime performance lower than compiled languages"
          - "Node.js single-threaded model can be limiting"
      - id: OPT-GO
        title: "Go backend + TypeScript frontend"
        description: "Use Go for the backend API for performance, TypeScript for the React frontend."
        pros:
          - "Superior backend performance and concurrency"
          - "Compiled binary — easy deployment"
        cons:
          - "Team has limited Go experience"
          - "No code sharing between frontend and backend"
          - "Slower iteration speed with unfamiliar language"
    chosen: OPT-TS
    chosenReason: "The team's deep TypeScript expertise and the 6-week MVP timeline make full-stack TypeScript the pragmatic choice."

  - id: GLOBAL-002
    topic: "Monorepo vs Multi-repo"
    context: "We need to decide how to organize our codebase for the frontend, backend, and shared packages."
    category: architecture
    requirementRefs: []
    contextRefs:
      - CTX-001
      - CTX-003
    options:
      - id: OPT-MONO
        title: "Monorepo with Turborepo"
        description: "Single repository with Turborepo for build orchestration, separate packages for frontend, backend, and shared."
        pros:
          - "Atomic cross-package changes"
          - "Shared TypeScript types and validation"
          - "Simpler CI/CD with one pipeline"
        cons:
          - "Build times can grow as codebase scales"
          - "Turborepo adds tooling complexity"
      - id: OPT-MULTI
        title: "Separate repositories"
        description: "Frontend and backend in separate repos, shared types published as npm package."
        pros:
          - "Independent deployment cycles"
          - "Clear ownership boundaries"
        cons:
          - "Cross-repo changes are painful"
          - "Type sharing requires publishing a package"
          - "More CI/CD pipelines to maintain"
    chosen: OPT-MONO
    chosenReason: "With only 2 developers, the simplicity of atomic changes and shared types in a monorepo far outweighs any scaling concerns."

  - id: GLOBAL-003
    topic: "Test Strategy"
    context: "We need a testing approach that gives us confidence without slowing down our tight MVP timeline."
    category: testing
    parentDecisionRef: GLOBAL-001
    requirementRefs: []
    contextRefs:
      - CTX-003
    options:
      - id: OPT-FULL-PYRAMID
        title: "Full test pyramid (unit + integration + e2e)"
        description: "Comprehensive coverage at all levels from day one."
        pros:
          - "High confidence in correctness"
          - "Catches bugs at every level"
        cons:
          - "Significant time investment upfront"
          - "E2E tests are slow and flaky"
      - id: OPT-INTEGRATION-FIRST
        title: "Integration-first with selective unit tests"
        description: "Focus on integration tests that cover API endpoints and key flows; add unit tests only for complex business logic."
        pros:
          - "High confidence with less code"
          - "Tests real behavior, not implementation details"
          - "Faster to write during MVP phase"
        cons:
          - "Less granular failure messages"
          - "May need to add more unit tests later"
    chosen: OPT-INTEGRATION-FIRST
    chosenReason: "Integration-first gives us the best confidence-to-effort ratio for our 6-week MVP timeline. We can add unit tests for complex logic as needed."

  - id: GLOBAL-004
    topic: "Authentication Strategy"
    context: "Every project needs auth — we should pick one approach that all projects share rather than each project rolling its own."
    category: architecture
    requirementRefs: []
    contextRefs:
      - CTX-002
      - CTX-003
    options:
      - id: OPT-JWT
        title: "JWT with refresh tokens"
        description: "Stateless JWT access tokens with short expiry, paired with long-lived refresh tokens stored in httpOnly cookies."
        pros:
          - "Stateless — no session store needed"
          - "Works well with API-first architecture"
          - "Easy to implement with existing libraries"
        cons:
          - "Token revocation is complex"
          - "JWT size grows with claims"
      - id: OPT-SESSION
        title: "Server-side sessions with Redis"
        description: "Traditional server-side sessions stored in Redis, session ID in httpOnly cookie."
        pros:
          - "Easy revocation — just delete the session"
          - "Small cookie size"
          - "Battle-tested pattern"
        cons:
          - "Requires Redis infrastructure"
          - "Stateful — harder to scale horizontally"
          - "Extra infrastructure cost for a bootstrapped startup"
    chosen: OPT-JWT
    chosenReason: "JWT avoids the need for Redis infrastructure, keeping our stack simple and costs low during the bootstrapped phase."
