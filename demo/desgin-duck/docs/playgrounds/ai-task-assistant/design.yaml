notes: "Exploring whether AI-powered task enhancement is feasible and valuable. This playground is for discovery — no commitment to ship."
decisions:
  - id: AI-DES-001
    topic: "LLM Provider"
    context: "We need to choose an LLM provider for task enhancement. Key factors: cost, quality, latency, and avoiding vendor lock-in."
    category: technology
    requirementRefs:
      - AI-001
      - AI-002
      - AI-003
    contextRefs:
      - AI-CTX-002
      - AI-CTX-003
    options:
      - id: OPT-OPENAI
        title: "OpenAI (GPT-4o-mini)"
        description: "Use GPT-4o-mini via the OpenAI API for all task enhancement features."
        pros:
          - "High quality output for text tasks"
          - "Fast response times (~500ms)"
          - "Very affordable for our volume ($0.15/1M input tokens)"
        cons:
          - "Vendor lock-in to OpenAI"
          - "Rate limits on free tier"
      - id: OPT-ANTHROPIC
        title: "Anthropic (Claude Haiku)"
        description: "Use Claude Haiku for fast, cheap task enhancement."
        pros:
          - "Excellent instruction following"
          - "Very competitive pricing"
          - "Strong at structured output"
        cons:
          - "Smaller ecosystem than OpenAI"
          - "Vendor lock-in to Anthropic"
      - id: OPT-MULTI-LLM
        title: "Provider-agnostic with Vercel AI SDK"
        description: "Use the Vercel AI SDK to abstract the LLM provider, allowing us to swap between OpenAI, Anthropic, or local models."
        pros:
          - "No vendor lock-in — swap providers with config"
          - "Can test different models for different features"
          - "Community-maintained provider adapters"
        cons:
          - "Abstraction layer adds complexity"
          - "Lowest-common-denominator API may miss provider-specific features"
    chosen: OPT-MULTI-LLM
    chosenReason: "The Vercel AI SDK lets us experiment with multiple providers during exploration without committing to one. Perfect for a playground."

  - id: AI-DES-002
    topic: "AI UX Pattern"
    context: "How should AI suggestions appear in the UI? We need to balance helpfulness with not being intrusive."
    category: product
    requirementRefs:
      - AI-001
      - AI-002
    options:
      - id: OPT-INLINE
        title: "Inline suggestions (like GitHub Copilot)"
        description: "AI suggestions appear as ghost text inline, accepted with Tab."
        pros:
          - "Feels natural and non-intrusive"
          - "Fast interaction — just press Tab"
        cons:
          - "Complex to implement for structured fields (labels, priority)"
          - "Can be distracting while typing"
      - id: OPT-SIDEBAR
        title: "Sidebar panel with suggestions"
        description: "A collapsible sidebar shows AI suggestions that users can accept or dismiss."
        pros:
          - "Clear separation between user input and AI suggestions"
          - "Can show multiple suggestions at once"
          - "Works for both text and structured fields"
        cons:
          - "Takes up screen space"
          - "Extra click to accept suggestions"
      - id: OPT-BUTTON
        title: "On-demand button (Enhance)"
        description: "A button triggers AI analysis and presents suggestions in a modal or popover."
        pros:
          - "User controls when AI runs — no surprise costs"
          - "Simple to implement"
          - "Clear before/after comparison"
        cons:
          - "Extra step in the workflow"
          - "Less 'magical' than inline suggestions"
    chosen: null
    chosenReason: null
