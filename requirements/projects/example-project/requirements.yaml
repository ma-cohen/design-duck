# Example project requirements
visionAlignment: "This project helps achieve the vision by enabling users to search, discover, and save products efficiently"

requirements:
  - id: req-001
    description: Users can search products by name
    userValue: Quickly find desired products
  - id: req-002
    description: Users can save items to a wishlist
    userValue: Return to considered items later
  - id: req-003
    description: Users can track order delivery status
    userValue: Know when their package will arrive
