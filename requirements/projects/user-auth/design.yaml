notes: |
  Research links:
  - OWASP Authentication Cheat Sheet: https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html
  - Comparison of JWT vs session-based auth for SPAs
  - Team agreed on 2024-12 to prioritize passwordless flows in v2

  Key constraints:
  - Must support SSO integration in the future
  - Token refresh must be seamless (no forced logouts)
  - Password hashing must use bcrypt or argon2
decisions:
  - id: DEC-AUTH-001
    topic: "Authentication strategy"
    context: "We need to decide between session-based auth and token-based auth (JWT) for our SPA frontend"
    requirementRefs:
      - AUTH-001
    options:
      - id: session-based
        title: "Session-based (server-side cookies)"
        description: "Traditional server-side sessions with httpOnly cookies"
        pros:
          - "Simple to implement and well understood"
          - "Easy to revoke sessions server-side"
          - "httpOnly cookies prevent XSS token theft"
        cons:
          - "Requires sticky sessions or shared session store"
          - "Harder to scale across multiple services"
      - id: jwt-tokens
        title: "JWT tokens (stateless)"
        description: "Stateless JSON Web Tokens stored client-side"
        pros:
          - "Stateless — no server-side session storage needed"
          - "Scales well across microservices"
          - "Works naturally with SPAs and mobile apps"
        cons:
          - "Cannot easily revoke individual tokens"
          - "Token size is larger than a session ID"
          - "Requires careful handling of refresh tokens"
    chosen: jwt-tokens
    chosenReason: "Our architecture will eventually be microservice-based, and stateless tokens simplify cross-service auth"
  - id: DEC-AUTH-002
    topic: "Two-factor authentication method"
    context: "We need to choose the 2FA approach for users who opt in"
    requirementRefs:
      - AUTH-003
    options:
      - id: totp
        title: "TOTP (Authenticator app)"
        description: "Time-based one-time passwords via apps like Google Authenticator"
        pros:
          - "No ongoing cost per verification"
          - "Works offline"
          - "Widely supported"
        cons:
          - "Users must install an authenticator app"
          - "Recovery is complex if device is lost"
      - id: sms-otp
        title: "SMS OTP"
        description: "One-time codes sent via SMS"
        pros:
          - "Very familiar to users"
          - "No app installation required"
        cons:
          - "Per-message cost"
          - "Vulnerable to SIM swapping attacks"
          - "Requires phone number collection"
    chosen: null
    chosenReason: null
  - id: DEC-AUTH-003
    topic: "Password hashing algorithm"
    context: "We need to choose a secure password hashing algorithm that balances security with performance"
    requirementRefs:
      - AUTH-001
    options:
      - id: bcrypt
        title: "bcrypt"
        description: "Widely used adaptive hash function designed for passwords"
        pros:
          - "Battle-tested and widely adopted"
          - "Built-in salt generation"
          - "Adjustable cost factor"
        cons:
          - "72-byte password length limit"
          - "Not memory-hard (GPU attacks possible)"
      - id: argon2
        title: "Argon2id"
        description: "Winner of the Password Hashing Competition (2015), memory-hard"
        pros:
          - "Memory-hard — resists GPU/ASIC attacks"
          - "Configurable time, memory, and parallelism"
          - "Recommended by OWASP"
        cons:
          - "Less widely supported in older libraries"
          - "Slightly more complex configuration"
      - id: scrypt
        title: "scrypt"
        description: "Memory-hard key derivation function"
        pros:
          - "Memory-hard design"
          - "Good library support"
        cons:
          - "Harder to tune parameters correctly"
          - "Less recommended than Argon2 for new projects"
    chosen: argon2
    chosenReason: "Argon2id is the current OWASP recommendation and provides the best resistance against modern GPU-based attacks"
  - id: DEC-AUTH-004
    topic: "Password reset flow"
    context: "Deciding the mechanism for secure password resets"
    requirementRefs:
      - AUTH-002
    options:
      - id: email-link
        title: "Email with reset link"
        description: "Send a time-limited link to the user's email that opens a reset form"
        pros:
          - "Industry standard approach"
          - "Simple user experience"
          - "Link can be single-use and time-limited"
        cons:
          - "Depends on email delivery reliability"
          - "Link could be intercepted in transit"
      - id: email-code
        title: "Email with verification code"
        description: "Send a short numeric code to email, user enters it in the app"
        pros:
          - "Works well on mobile (no context switch)"
          - "Code is easier to type than clicking a link"
        cons:
          - "Short codes have smaller keyspace"
          - "User must manually type the code"
    chosen: null
    chosenReason: null
