visionAlignment: "Secure authentication enables teams to collaborate safely on requirements"
requirements:
  - id: AUTH-001
    description: "Users can sign up and log in with email and password"
    userValue: "Provides a familiar and accessible way to access the platform"
  - id: AUTH-002
    description: "Users can reset their password via email"
    userValue: "Prevents account lockout and reduces support burden"
  - id: AUTH-003
    description: "Users can enable two-factor authentication"
    userValue: "Gives security-conscious users peace of mind for sensitive data"
